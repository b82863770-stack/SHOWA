<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHOWA - لوحة التحكم (الآدمن)</title>
  <style>
    :root { --bg: #0d0e12; --card: #181a20; --accent: #e50914; --text: #fff; --border: #262932; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
    h2 { margin-bottom: 20px; border-right: 4px solid var(--accent); padding-right: 10px; font-size: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 10px; background: #121418; border: 1px solid var(--border); border-radius: 8px; color: #fff; outline: none; font-size: 13px; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    .ep-item { display: flex; gap: 8px; margin-bottom: 8px; }
    .btn { width: 100%; background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }
    .btn-add-ep { background: #222; border: 1px dashed #555; }
    .list-title { margin-top: 30px; border-right: 4px solid var(--accent); padding-right: 10px; font-size: 16px; }
    .item-card { background: #121418; padding: 12px; border-radius: 8px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
    .btn-del { background: #331113; color: #ff4d4d; border: 1px solid #551518; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container">
    <h2>➕ إضافة عمل جديد إلى SHOWA</h2>
    
    <form id="addForm" onsubmit="saveToFirebase(event)">
      <div class="form-group">
        <label>نوع المحتوى</label>
        <select id="type" onchange="toggleType()">
          <option value="movie">فيلم 🎬</option>
          <option value="series">مسلسل 📺</option>
        </select>
      </div>

      <div class="form-group">
        <label>اسم الفيلم / المسلسل *</label>
        <input type="text" id="title" required placeholder="مثال: The Walking Dead" />
      </div>

      <div class="form-group">
        <label>رابط البوستر *</label>
        <input type="url" id="poster" required placeholder="https://..." />
      </div>

      <div class="form-group">
        <label>الوصف / القصة</label>
        <textarea id="desc" placeholder="نبذة عن القصة..."></textarea>
      </div>

      <div id="movieSec" class="form-group">
        <label>رابط تشغيل الفيلم *</label>
        <input type="text" id="movieUrl" placeholder="https://..." />
      </div>

      <div id="seriesSec" class="form-group" style="display:none;">
        <label>الحلقات *</label>
        <div id="epList">
          <div class="ep-item">
            <input type="text" class="ep-num" placeholder="رقم" style="width: 70px;" value="1" />
            <input type="text" class="ep-url" placeholder="رابط الحلقة..." />
          </div>
        </div>
        <button type="button" class="btn btn-add-ep" onclick="addEpField()">➕ إضافة حلقة أخرى</button>
      </div>

      <button type="submit" class="btn">نشر العمل للمشاهدين 🚀</button>
    </form>

    <h3 class="list-title">📋 الأعمال المضافة حالياً</h3>
    <div id="adminList"></div>
  </div>

  <script>
    const DB_BASE = "https://showa-4ea31-default-rtdb.firebaseio.com";

    function toggleType() {
      const type = document.getElementById('type').value;
      document.getElementById('movieSec').style.display = type === 'movie' ? 'block' : 'none';
      document.getElementById('seriesSec').style.display = type === 'series' ? 'block' : 'none';
    }

    function addEpField() {
      const epList = document.getElementById('epList');
      const count = epList.children.length + 1;
      const div = document.createElement('div');
      div.className = 'ep-item';
      div.innerHTML = `
        <input type="text" class="ep-num" placeholder="رقم" style="width: 70px;" value="${count}" />
        <input type="text" class="ep-url" placeholder="رابط الحلقة..." />
      `;
      epList.appendChild(div);
    }

    async function saveToFirebase(e) {
      e.preventDefault();
      const type = document.getElementById('type').value;
      const title = document.getElementById('title').value;
      const poster = document.getElementById('poster').value;
      const desc = document.getElementById('desc').value;

      let payload = { type, title, poster, desc, id: Date.now() };

      if (type === 'movie') {
        const url = document.getElementById('movieUrl').value;
        if (!url) return alert('يرجى وضع رابط الفيلم');
        payload.videoUrl = url;
      } else {
        const nums = document.querySelectorAll('.ep-num');
        const urls = document.querySelectorAll('.ep-url');
        let episodes = [];
        nums.forEach((num, i) => {
          if (urls[i].value) episodes.push({ number: num.value, url: urls[i].value });
        });
        if (episodes.length === 0) return alert('يرجى إضافة حلقة واحدة على الأقل');
        payload.episodes = episodes;
      }

      await fetch(`${DB_BASE}/media.json`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      alert('تم نشر العمل بنجاح وحُفظ في قواعد البيانات! 🚀');
      document.getElementById('addForm').reset();
      document.getElementById('epList').innerHTML = '';
      addEpField();
      toggleType();
      loadItems();
    }

    async function loadItems() {
      const res = await fetch(`${DB_BASE}/media.json`);
      const data = await res.json();
      const adminList = document.getElementById('adminList');
      adminList.innerHTML = '';

      if (data) {
        Object.keys(data).forEach(key => {
          const item = data[key];
          adminList.innerHTML += `
            <div class="item-card">
              <span>${item.title} (${item.type === 'movie' ? 'فيلم 🎬' : 'مسلسل 📺'})</span>
              <button class="btn-del" onclick="deleteItem('${key}')">حذف 🗑️</button>
            </div>
          `;
        });
      } else {
        adminList.innerHTML = '<p style="color:#aaa; font-size:12px; margin-top:10px;">لا يوجد محتوى حالياً.</p>';
      }
    }

    async function deleteItem(key) {
      if (confirm('هل أنت تأكد من حذف هذا العمل؟')) {
        await fetch(`${DB_BASE}/media/${key}.json`, { method: 'DELETE' });
        loadItems();
      }
    }

    loadItems();
  </script>
</body>
</html>
