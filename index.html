<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SHOWA</title>
  <style>
    :root { --bg: #0d0e12; --card: #181a20; --accent: #e50914; --text: #fff; --border: #262932; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background: var(--bg); color: var(--text); padding-bottom: 30px; }
    header { padding: 15px 20px; background: rgba(13, 14, 18, 0.92); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:10; backdrop-filter: blur(10px); }
    .logo { font-size: 24px; font-weight: 900; color: var(--accent); letter-spacing: 2px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; padding: 20px; }
    .card { background: var(--card); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
    .card:hover { border-color: var(--accent); transform: translateY(-3px); }
    .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #121418; }
    .card-title { font-size: 12px; padding: 8px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: bold; }
    
    .player-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:100; flex-direction: column; }
    .player-header { padding: 12px 15px; display: flex; justify-content: space-between; background: #111; border-bottom: 1px solid var(--border); }
    iframe { width: 100%; aspect-ratio: 16/9; border: none; max-height: 40vh; background: #000; }
    .player-body { padding: 15px; overflow-y: auto; flex:1; }
    .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 10px; }
    .ep-btn { background: var(--card); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; font-size: 12px; cursor: pointer; text-align: center; font-weight: bold; }
    .ep-btn.active { background: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>

  <header>
    <div class="logo">SHOWA</div>
  </header>

  <div class="grid" id="userGrid"></div>

  <div class="player-modal" id="playerModal">
    <div class="player-header">
      <span id="pTitle" style="font-size: 13px; font-weight: bold;"></span>
      <button onclick="closePlayer()" style="background:none; border:none; color:#fff; font-size:16px; cursor:pointer;">إغلاق ✕</button>
    </div>
    <iframe id="vPlayer" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    <div class="player-body">
      <h3 id="pName"></h3>
      <p id="pDesc" style="font-size: 12px; color: #aaa; margin-top: 6px; line-height: 1.4;"></p>
      <div id="epSec" style="display:none; margin-top: 15px;">
        <h4 style="font-size: 13px; border-right: 3px solid var(--accent); padding-right: 6px;">قائمة الحلقات</h4>
        <div class="ep-grid" id="epGrid"></div>
      </div>
    </div>
  </div>

  <script>
    const DB_BASE = "https://showa-4ea31-default-rtdb.firebaseio.com";
    let mediaList = {};

    async function loadContent() {
      const res = await fetch(`${DB_BASE}/media.json`);
      mediaList = await res.json() || {};
      const grid = document.getElementById('userGrid');
      grid.innerHTML = '';

      const keys = Object.keys(mediaList);
      if (keys.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px 20px; color:#aaa; font-size:13px;">لا يوجد أفلام أو مسلسلات متاحة حالياً 🎬</div>';
        return;
      }

      keys.reverse().forEach(key => {
        const item = mediaList[key];
        grid.innerHTML += `
          <div class="card" onclick="openMedia('${key}')">
            <img src="${item.poster}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'" />
            <div class="card-title">${item.title}</div>
          </div>
        `;
      });
    }

    function openMedia(key) {
      const item = mediaList[key];
      document.getElementById('pName').innerText = item.title;
      document.getElementById('pDesc').innerText = item.desc || 'لا يوجد وصف متاح.';
      
      const epSec = document.getElementById('epSec');
      const epGrid = document.getElementById('epGrid');
      const player = document.getElementById('vPlayer');

      if (item.type === 'movie') {
        epSec.style.display = 'none';
        player.src = item.videoUrl;
        document.getElementById('pTitle').innerText = item.title;
      } else {
        epSec.style.display = 'block';
        epGrid.innerHTML = '';
        item.episodes.forEach((ep, i) => {
          const btn = document.createElement('button');
          btn.className = `ep-btn ${i === 0 ? 'active' : ''}`;
          btn.innerText = `حلقة ${ep.number}`;
          btn.onclick = () => {
            document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            player.src = ep.url;
            document.getElementById('pTitle').innerText = `${item.title} - الحلقة ${ep.number}`;
          };
          episodesGrid = epGrid.appendChild(btn);
        });
        if (item.episodes.length > 0) {
          player.src = item.episodes[0].url;
          document.getElementById('pTitle').innerText = `${item.title} - الحلقة ${item.episodes[0].number}`;
        }
      }

      document.getElementById('playerModal').style.display = 'flex';
    }

    function closePlayer() {
      document.getElementById('playerModal').style.display = 'none';
      document.getElementById('vPlayer').src = '';
    }

    loadContent();
  </script>
</body>
</html>
