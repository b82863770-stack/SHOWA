<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHOWA</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SHOWA">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">

  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent-color: #6366f1;
      --text-color: #f8fafc;
      --text-secondary: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      padding-bottom: 30px;
    }

    header {
      position: sticky;
      top: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    header h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--accent-color);
      letter-spacing: 1px;
    }

    .search-container {
      padding: 15px 20px;
    }

    .search-box {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background-color: var(--card-bg);
      color: var(--text-color);
      font-size: 16px;
      outline: none;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin: 10px 20px 15px 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 12px;
      padding: 0 20px;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .card:active {
      transform: scale(0.95);
    }

    .card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      background-color: #334155;
    }

    .card-info {
      padding: 8px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-rating {
      font-size: 10px;
      color: #f59e0b;
      margin-top: 4px;
    }

    #loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    /* Modal / Player View */
    .player-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      flex-direction: column;
    }

    .player-header {
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #000;
    }

    .close-btn {
      background: var(--accent-color);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .iframe-container {
      flex: 1;
      width: 100%;
      height: 100%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>SHOWA</h1>
  </header>

  <div class="search-container">
    <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن فيلم أو مسلسل..." />
  </div>

  <div class="section-title" id="sectionTitle">الأفلام الأكثر مشاهدة</div>

  <div id="loading">جاري تحميل المحتوى...</div>
  <div class="grid" id="moviesGrid"></div>

  <!-- مشغل الفيديو -->
  <div class="player-modal" id="playerModal">
    <div class="player-header">
      <span id="playerTitle" style="font-size: 14px; font-weight: bold;"></span>
      <button class="close-btn" onclick="closePlayer()">إغلاق ✕</button>
    </div>
    <div class="iframe-container">
      <iframe id="videoPlayer" src="" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    const API_KEY = 'c90649169b66b322c8256426f78b20b5';
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMG_URL = 'https://image.tmdb.org/t/p/w500';

    const moviesGrid = document.getElementById('moviesGrid');
    const loading = document.getElementById('loading');
    const searchInput = document.getElementById('searchInput');
    const sectionTitle = document.getElementById('sectionTitle');
    const playerModal = document.getElementById('playerModal');
    const videoPlayer = document.getElementById('videoPlayer');
    const playerTitle = document.getElementById('playerTitle');

    async function fetchMovies(endpoint, query = '') {
      loading.style.display = 'block';
      moviesGrid.innerHTML = '';
      
      let url = `${BASE_URL}${endpoint}?api_key=${API_KEY}&language=ar-SA`;
      if (query) {
        url += `&query=${encodeURIComponent(query)}`;
      }

      try {
        const response = await fetch(url);
        const data = await response.json();
        loading.style.display = 'none';
        displayMovies(data.results);
      } catch (error) {
        loading.innerText = 'عذراً، فشل تحميل البيانات.';
      }
    }

    function displayMovies(movies) {
      if (!movies || movies.length === 0) {
        moviesGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #94a3b8;">لا توجد نتائج مطابقة.</p>';
        return;
      }

      movies.forEach(item => {
        if (!item.poster_path) return;
        
        const isMovie = item.media_type ? item.media_type === 'movie' : !!item.title;
        const title = item.title || item.name;
        const id = item.id;

        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => openPlayer(id, isMovie ? 'movie' : 'tv', title);
        
        card.innerHTML = `
          <img src="${IMG_URL + item.poster_path}" alt="${title}" loading="lazy">
          <div class="card-info">
            <div class="card-title">${title}</div>
            <div class="card-rating">★ ${item.vote_average ? item.vote_average.toFixed(1) : 'N/A'}</div>
          </div>
        `;
        moviesGrid.appendChild(card);
      });
    }

    // فتح مشغل الفيديو والمشاهدة
    function openPlayer(id, type, title) {
      playerTitle.innerText = title;
      // استخدام سيرفرات vidsrc المجانية للمشاهدة المباشرة
      videoPlayer.src = `https://vidsrc.pro/embed/${type}/${id}`;
      playerModal.style.display = 'flex';
    }

    // إغلاق المشغل
    function closePlayer() {
      playerModal.style.display = 'none';
      videoPlayer.src = '';
    }

    // البحث مع التوقف اللحظي
    let timer;
    searchInput.addEventListener('input', (e) => {
      clearTimeout(timer);
      const val = e.target.value.trim();
      
      timer = setTimeout(() => {
        if (val) {
          sectionTitle.innerText = `نتائج البحث عن: ${val}`;
          fetchMovies('/search/multi', val);
        } else {
          sectionTitle.innerText = 'الأفلام الأكثر مشاهدة';
          fetchMovies('/movie/popular');
        }
      }, 400);
    });

    // التحميل المبدئي عند الفتح
    fetchMovies('/movie/popular');
  </script>

</body>
</html>
