<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHOWA - السينما بين يديك</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SHOWA">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">

  <style>
    :root {
      --bg-color: #0b0b0b;
      --card-bg: #141414;
      --accent-color: #e50914; /* أحمر سينمائي */
      --accent-hover: #b90910;
      --text-color: #ffffff;
      --text-secondary: #aaaaaa;
      --nav-bg: #111111;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      padding-bottom: 40px;
    }

    /* الهيدر العلوي */
    header {
      position: sticky;
      top: 0;
      background: rgba(11, 11, 11, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    header h1 {
      font-size: 26px;
      font-weight: 900;
      color: var(--accent-color);
      letter-spacing: 2px;
    }

    /* مربع البحث */
    .search-container {
      padding: 15px 20px 5px 20px;
    }

    .search-box {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #222;
      background-color: var(--card-bg);
      color: var(--text-color);
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s;
    }

    .search-box:focus {
      border-color: var(--accent-color);
    }

    /* أشرطة التبويب بالأعلى (الأقسام على طريقة سينما بوكس) */
    .categories-bar {
      display: flex;
      gap: 10px;
      padding: 15px 20px;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none; /* إخفاء شريط التمرير */
    }

    .categories-bar::-webkit-scrollbar {
      display: none;
    }

    .tab-btn {
      background-color: var(--card-bg);
      color: var(--text-secondary);
      border: 1px solid #222;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .tab-btn.active {
      background-color: var(--accent-color);
      color: #fff;
      border-color: var(--accent-color);
      box-shadow: 0 4px 12px rgba(229, 9, 20, 0.4);
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin: 10px 20px 15px 20px;
      border-right: 4px solid var(--accent-color);
      padding-right: 10px;
    }

    /* شبكة العرض */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 14px;
      padding: 0 20px;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:active {
      transform: scale(0.95);
    }

    .card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      background-color: #1a1a1a;
    }

    .badge-hd {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(229, 9, 20, 0.9);
      color: white;
      font-size: 9px;
      font-weight: bold;
      padding: 2px 5px;
      border-radius: 4px;
    }

    .card-info {
      padding: 8px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-rating {
      font-size: 10px;
      color: #f59e0b;
      margin-top: 4px;
    }

    #loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    /* شاشة المشغل (Player Modal) */
    .player-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 1000;
      flex-direction: column;
    }

    .player-header {
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111;
      border-bottom: 1px solid #222;
    }

    .close-btn {
      background: var(--accent-color);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    .iframe-container {
      flex: 1;
      width: 100%;
      height: 100%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>SHOWA</h1>
  </header>

  <!-- البحث -->
  <div class="search-container">
    <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن فيلم، مسلسل، أو أنمي..." />
  </div>

  <!-- أقسام سينما بوكس -->
  <div class="categories-bar">
    <button class="tab-btn active" onclick="switchCategory('popular', this)">🔥 الأكثر شهرة</button>
    <button class="tab-btn" onclick="switchCategory('movies', this)">🎬 أفلام</button>
    <button class="tab-btn" onclick="switchCategory('series', this)">📺 مسلسلات</button>
    <button class="tab-btn" onclick="switchCategory('anime', this)">⛩️ أنمي</button>
    <button class="tab-btn" onclick="switchCategory('top_rated', this)">⭐ الأعلى تقييماً</button>
  </div>

  <div class="section-title" id="sectionTitle">الأكثر شهرة الآن</div>

  <div id="loading">جاري جلب المحتوى...</div>
  <div class="grid" id="moviesGrid"></div>

  <!-- مشغل الفيديو -->
  <div class="player-modal" id="playerModal">
    <div class="player-header">
      <span id="playerTitle" style="font-size: 14px; font-weight: bold; color: #fff;"></span>
      <button class="close-btn" onclick="closePlayer()">إغلاق ✕</button>
    </div>
    <div class="iframe-container">
      <iframe id="videoPlayer" src="" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    const API_KEY = 'c90649169b66b322c8256426f78b20b5';
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMG_URL = 'https://image.tmdb.org/t/p/w500';

    const moviesGrid = document.getElementById('moviesGrid');
    const loading = document.getElementById('loading');
    const searchInput = document.getElementById('searchInput');
    const sectionTitle = document.getElementById('sectionTitle');
    const playerModal = document.getElementById('playerModal');
    const videoPlayer = document.getElementById('videoPlayer');
    const playerTitle = document.getElementById('playerTitle');

    let currentCategory = 'popular';

    async function fetchMovies(endpoint, query = '') {
      loading.style.display = 'block';
      moviesGrid.innerHTML = '';
      
      let url = `${BASE_URL}${endpoint}?api_key=${API_KEY}&language=ar-SA`;
      if (query) {
        url += `&query=${encodeURIComponent(query)}`;
      }

      try {
        const response = await fetch(url);
        const data = await response.json();
        loading.style.display = 'none';
        displayMovies(data.results);
      } catch (error) {
        loading.innerText = 'عذراً، تعذر جلب البيانات.';
      }
    }

    function displayMovies(movies) {
      if (!movies || movies.length === 0) {
        moviesGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #aaa;">لا توجد نتائج مطابقة.</p>';
        return;
      }

      movies.forEach(item => {
        if (!item.poster_path) return;
        
        const isMovie = item.media_type ? item.media_type === 'movie' : (item.title ? true : false);
        const title = item.title || item.name;
        const id = item.id;

        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => openPlayer(id, isMovie ? 'movie' : 'tv', title);
        
        card.innerHTML = `
          <span class="badge-hd">HD</span>
          <img src="${IMG_URL + item.poster_path}" alt="${title}" loading="lazy">
          <div class="card-info">
            <div class="card-title">${title}</div>
            <div class="card-rating">★ ${item.vote_average ? item.vote_average.toFixed(1) : 'N/A'}</div>
          </div>
        `;
        moviesGrid.appendChild(card);
      });
    }

    // التنقل بين الأقسام
    function switchCategory(type, btnElement) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btnElement.classList.add('active');
      searchInput.value = '';
      currentCategory = type;

      if (type === 'popular') {
        sectionTitle.innerText = 'الأكثر شهرة الآن';
        fetchMovies('/movie/popular');
      } else if (type === 'movies') {
        sectionTitle.innerText = 'أحدث الأفلام';
        fetchMovies('/discover/movie');
      } else if (type === 'series') {
        sectionTitle.innerText = 'أحدث المسلسلات';
        fetchMovies('/discover/tv');
      } else if (type === 'anime') {
        sectionTitle.innerText = 'عالم الأنمي';
        fetchMovies('/discover/tv', '', '&with_genres=16'); // قسم الأنمي/الرسوم المتحركة
      } else if (type === 'top_rated') {
        sectionTitle.innerText = 'الأعلى تقييماً';
        fetchMovies('/movie/top_rated');
      }
    }

    // تشغيل الفيديو
    function openPlayer(id, type, title) {
      playerTitle.innerText = title;
      videoPlayer.src = `https://vidsrc.pro/embed/${type}/${id}`;
      playerModal.style.display = 'flex';
    }

    function closePlayer() {
      playerModal.style.display = 'none';
      videoPlayer.src = '';
    }

    // البحث
    let timer;
    searchInput.addEventListener('input', (e) => {
      clearTimeout(timer);
      const val = e.target.value.trim();
      
      timer = setTimeout(() => {
        if (val) {
          sectionTitle.innerText = `نتائج البحث عن: ${val}`;
          fetchMovies('/search/multi', val);
        } else {
          switchCategory(currentCategory, document.querySelector('.tab-btn.active'));
        }
      }, 400);
    });

    // التحميل المبدئي
    fetchMovies('/movie/popular');
  </script>

</body>
</html>
